<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCS — Study</title>
  <style>
:root{
  --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e; --border:#2a2a2a;
  --text:#e0e0e0; --text-dim:#777; --gold:#c8a84e; --gold-dim:#8a7234;
  --green:#50c870; --red:#e05050; --radius:12px; --max-w:960px;
}
*{box-sizing:border-box}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  line-height:1.6; margin:0; padding:0 16px 40px;
}
header,main{max-width:var(--max-w); margin:0 auto}
header{padding:28px 0 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:16px}
h1{font-size:1.8rem; letter-spacing:-0.02em; margin:0}
h1 span{color:var(--gold)}
.tagline{color:var(--text-dim); margin-top:4px}
.card,.module{
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:24px; margin-top:28px;
}
.row{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:14px 0}
label{color:var(--text-dim); font-size:.92rem}
select,input[type=checkbox]{cursor:pointer}
button{
  background:var(--surface2); color:var(--text); border:1px solid var(--border);
  padding:10px 16px; border-radius:10px; cursor:pointer; font-size:.92rem;
}
button:hover{border-color:var(--gold)}
button.primary{border-color:var(--gold); color:var(--gold)}
.muted{color:var(--text-dim)}
.swatches{display:flex; gap:8px; margin:20px 0}
.swatch{
  flex:1; height:120px; border-radius:10px; border:2px solid transparent; cursor:pointer;
  transition:transform .12s,border-color .15s;
}
.swatch:hover{transform:scaleY(1.03); border-color:#666}
.ref{width:140px; height:140px; border-radius:12px; border:1px solid var(--border)}
.badge{display:inline-block; padding:4px 8px; border:1px solid var(--border); border-radius:999px; color:var(--text-dim); font-size:.8rem}
.error{color:#ff8a8a; margin-top:10px}
.ok{color:var(--green)}
pre{
  white-space:pre-wrap; background:var(--surface2); padding:14px; border-radius:10px; overflow:auto;
}
.lang-toggle{display:flex; gap:6px}
.lang-btn{padding:8px 12px; font-size:.82rem}
.lang-btn.active{border-color:var(--gold); color:var(--gold)}
@media (max-width:700px){
  .swatch{height:84px}
  .ref{width:110px; height:110px}
  header{flex-direction:column; align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div>
    <h1><span>SCS</span> — <span data-i18n="siteTitle"></span></h1>
    <p class="tagline" data-i18n="siteTagline"></p>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
</header>

<main>
  <div class="card">
    <h2 data-i18n="consentTitle"></h2>
    <p data-i18n="consentBody"></p>

    <div class="row">
      <label><input type="checkbox" id="consent" /> <span data-i18n="consentLabel"></span></label>
    </div>

    <div class="row">
      <label><span data-i18n="patches"></span> :
        <select id="patchCount">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="7">7</option>
        </select>
      </label>

      <label><span data-i18n="series"></span> :
        <select id="seriesCount">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
        </select>
      </label>
    </div>

    <div class="row">
      <button class="primary" id="startBtn" data-i18n="start"></button>
      <span class="badge" data-i18n="connected"></span>
    </div>

    <p class="muted" data-i18n="instructionShort"></p>
    <p id="msg" class="error"></p>
  </div>
</main>

<script src="config.js"></script>
<script src="i18n.js"></script>
<script>
function createSeed() {
  return Math.floor(Math.random() * Number.MAX_SAFE_INTEGER);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

document.getElementById('startBtn').addEventListener('click', async () => {
  const consent = document.getElementById('consent').checked;
  const msg = document.getElementById('msg');
  msg.textContent = "";

  if (!consent) {
    msg.textContent = t('mustConsent');
    return;
  }

  const setup = {
    consent_given: true,
    patch_count: Number(document.getElementById('patchCount').value),
    series_count: Number(document.getElementById('seriesCount').value),
    test_instruction: t('instruction'),
    protocol_name: window.STUDY_CONFIG.protocolName,
    study_version: window.STUDY_CONFIG.studyVersion,
    session_seed: createSeed()
  };

  sessionStorage.setItem('study_setup', JSON.stringify(setup));
  location.href = 'study.html';
});

applyLang(detectLang());
</script>
</body>
</html>
